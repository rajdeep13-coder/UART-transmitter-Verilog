name: Simulation CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  iverilog-sim:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog

      - name: Run loopback testbench
        working-directory: sim
        run: make run

      - name: Run RX-only testbench
        working-directory: sim
        run: make run-rx
